<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work — nak.studio</title>
    <link rel="shortcut icon" href="../assets/favicon.ico">
    <link rel="stylesheet" href="../vendor/nakds.css">
    <link rel="stylesheet" href="../css/site.css">
</head>
<body>
  <div class="page-wrapper">

    <div id="site-nav"></div>
  <script>
    // Load shared navigation and set dynamic links
    fetch('../partials/nav.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('site-nav').innerHTML = html;
        // Dynamically set navigation links based on page depth
        var path = window.location.pathname;
        var docsIdx = path.indexOf('/docs/');
        var afterDocs = path.slice(docsIdx + 6); // skip '/docs/'
        var depth = afterDocs.split('/').length - 1;
        var prefix = '';
        if (depth === 0) prefix = '';
        else prefix = '../'.repeat(depth);

        var nav = document.getElementById('site-nav');
        if (nav) {
          var links = [
            { sel: '.nav-home', file: 'index.html' },
            { sel: '.nav-work', file: 'work/index.html' },
            { sel: '.nav-collectors', file: 'collectors/index.html' },
            { sel: '.nav-about', file: 'about/index.html' }
          ];
          links.forEach(link => {
            var el = nav.querySelector(link.sel);
            if (el) {
              el.setAttribute('href', prefix + link.file);
              el.classList.remove('active');
            }
          });
          // Highlight the active link
          var current = window.location.pathname.split('/').pop();
          if (!current || current === '') current = 'index.html';
          links.forEach(link => {
            if (current === link.file.split('/').pop()) {
              var el = nav.querySelector(link.sel);
              if (el) el.classList.add('active');
            }
          });
        }
      });
  </script>

    <header class="page-header">
      <h1 data-i18n="work">Lanak</h1>
    </header>

    <main>
      <section class="nk-section">
        <div class="nk-container--content">
          <div class="nk-grid-2@md nk-gap--large">

            <a href="bila-collection/" class="collection-card" style="background-image: url('../assets/artworks/bila-collection-cover.jpeg');">
              <div class="collection-card__overlay">
                <div class="collection-card__title" data-i18n="bilaCollection">Bila Bilduma</div>
                <div class="collection-card__subtitle" data-i18n="watercolors">Akuarelak</div>
              </div>
            </a>



            <a href="shadow-portraits/" class="collection-card" style="background-image: url('../assets/artworks/shadow-portraits/shadows-01.jpeg');">
              <div class="collection-card__overlay">
                <div class="collection-card__title" data-i18n="shadowPortraits">Itzalen Erretratuak</div>
                <div class="collection-card__subtitle" data-i18n="canvases">Mihiseak</div>
              </div>
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer nk-footer nk-bg--k-10 nk-text-align--center">
      <div class="nk-container--content">
        <div class="footer-contact">
          <a href="mailto:naiara@nak.studio">naiara@nak.studio</a>
          <span class="footer-dot"></span>
          <a href="https://instagram.com/nak.studio" target="_blank" rel="noopener">@nak.studio</a>
        </div>
        <p class="footer-copy">&copy; 2026 nak.studio &mdash; Basque Country</p>
      </div>
    </footer>

  </div>

  <script type="module">
    import { initI18n } from '../modules/i18n.js';
    initI18n();
  </script>
</body>
</html>
