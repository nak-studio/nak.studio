<!DOCTYPE html>
<html lang="eu">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KZYSRVFYXH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-KZYSRVFYXH');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bila Collection — nak.studio</title>
    <link rel="shortcut icon" href="../../assets/favicon.ico">
    <link rel="stylesheet" href="../../vendor/nakds.css">
    <link rel="stylesheet" href="../../css/site.css">
</head>
<body>
  <div class="page-wrapper">

    <div id="site-nav"></div>
  <script type="module">
    import { initI18n } from '../../modules/i18n.js';
    // Load shared navigation and set dynamic links
    fetch('../../partials/nav.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('site-nav').innerHTML = html;
        // Dynamically set navigation links based on page depth
        var path = window.location.pathname;
        var docsIdx = path.indexOf('/docs/');
        var afterDocs = path.slice(docsIdx + 6); // skip '/docs/'
        var depth = afterDocs.split('/').length - 1;
        var prefix = '';
        if (depth === 0) prefix = '';
        else prefix = '../'.repeat(depth);

        var nav = document.getElementById('site-nav');
        if (nav) {
          var links = [
            { sel: '.nav-home', file: 'index.html' },
            { sel: '.nav-work', file: 'work/index.html' },
            { sel: '.nav-collectors', file: 'collectors/index.html' },
            { sel: '.nav-about', file: 'about/index.html' }
          ];
          links.forEach(link => {
            var el = nav.querySelector(link.sel);
            if (el) {
              el.setAttribute('href', prefix + link.file);
              el.classList.remove('active');
            }
          });
          // Highlight the active link
          var current = window.location.pathname.split('/').pop();
          if (!current || current === '') current = 'index.html';
          // Special case for bila-collection subpage
          if (window.location.pathname.includes('bila-collection')) {
            var el = nav.querySelector('.nav-work');
            if (el) el.classList.add('active');
          } else {
            links.forEach(link => {
              if (current === link.file.split('/').pop()) {
                var el = nav.querySelector(link.sel);
                if (el) el.classList.add('active');
              }
            });
          }
        }
        // Initialize i18n after nav is loaded
        initI18n();
      });
  </script>

    <header class="page-header">
      <h1 data-i18n="bilaCollection">Bila Bilduma</h1>
      <p data-i18n="watercolors">Akuarelak</p>
    </header>

    <!-- Filter Bar -->
    <div id="filter-bar" class="nk-section nk-bg--k-8" style="display: none;">
      <div class="nk-container--content nk-text-align--center">
        <div id="filter-display"></div>
      </div>
    </div>

    <main>
      <section class="nk-section">
        <div class="nk-container--content">
          <div id="artworks" class="nk-grid-3@md nk-gap--large"></div>
        </div>
      </section>
    </main>

    <!-- Drawer -->
    <div id="drawer-dimmer" class="nk-dimmer"></div>
    <div id="artwork-drawer" class="nk-drawer">
      <button id="close-drawer" class="nk-button" style="margin-bottom: var(--large);" data-i18n="close">✕ Itxi</button>
      <div id="drawer-content"></div>
    </div>

    <section class="nk-section">
      <div class="nk-container--content nk-container--narrow">
        <div class="aceo-section">
          <a href="https://www.instagram.com/s/aGlnaGxpZ2h0OjE4MTAzOTczMDIwOTgyMTU2?story_media_id=3887752959459107815_5555621685&igsh=MWs1bHEycTd6a3VrNA==" target="_blank" rel="noopener"><img src="../../assets/available-mini.jpeg" alt="ACEO mini pieces" class="aceo-image" /></a>
          <div class="aceo-text">
            <h3 class="nk-heading--3" data-i18n="aceoTitle">ACEO — Mini Pieces</h3>
            <p data-i18n="aceoText" data-i18n-html class="nk-font--medium"></p>
          </div>
        </div>
      </div>
    </section>

    <footer class="site-footer nk-footer nk-bg--k-10 nk-text-align--center">
      <div class="nk-container--content">
        <div class="footer-contact">
          <a href="mailto:naiara@nak.studio">naiara@nak.studio</a>
          <span class="footer-dot"></span>
          <a href="https://instagram.com/nak.studio" target="_blank" rel="noopener">@nak.studio</a>
        </div>
        <p class="footer-copy">&copy; 2026 nak.studio &mdash; Basque Country</p>
      </div>
    </footer>
  </div>
  <script type="module" src="../../modules/artworkRenderer.js"></script>
  <script type="module" src="../../modules/i18n.js"></script>
  <script type="module">
    import { loadData } from '../../modules/dataService.js';
    import { displayArtworks } from '../../modules/artworkRenderer.js';

    function renderArtworks() {
      loadData().then(({ artworks }) => {
        // Only show artworks from the 'bila-collection'
        const filtered = artworks
          .filter(a => a.collection === 'bila-collection')
          .sort((a, b) => (b.isNew ? 1 : 0) - (a.isNew ? 1 : 0));
        displayArtworks(filtered, 'artworks');
      });
    }

    renderArtworks();
    document.addEventListener('languageChanged', renderArtworks);
  </script>
</body>
</html>
