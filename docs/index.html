  <body>
    <div class="home-split">
      <div class="home-video">
        <video autoplay muted loop playsinline>
          <source src="assets/home-video.webm" type="video/webm" />
          <source src="assets/cover.mp4" type="video/mp4" />
        </video>
      </div>
      <div class="home-brand">
        <img
          class="logo"
          src="assets/nak-studio-logo.svg"
          alt="NAK Studio Logo"
        />
      </div>
    </div>

    <div id="site-nav"></div>
    <script>
      // Load shared navigation and set dynamic links
      fetch("partials/nav.html")
        .then((res) => res.text())
        .then((html) => {
          document.getElementById("site-nav").innerHTML = html;
          // Dynamically set navigation links based on page depth
          var path = window.location.pathname;
          var docsIdx = path.indexOf("/docs/");
          var afterDocs = path.slice(docsIdx + 6); // skip '/docs/'
          var depth = afterDocs.split("/").length - 1;
          var prefix = "";
          if (depth === 0) prefix = "";
          else prefix = "../".repeat(depth);

          var nav = document.getElementById("site-nav");
          if (nav) {
            var links = [
              { sel: ".nav-home", file: "index.html" },
              { sel: ".nav-work", file: "work/index.html" },
              { sel: ".nav-collectors", file: "collectors/index.html" },
              { sel: ".nav-about", file: "about/index.html" }
            ];
            links.forEach((link) => {
              var el = nav.querySelector(link.sel);
              if (el) {
                el.setAttribute("href", prefix + link.file);
                el.classList.remove("active");
              }
            });
            // Highlight the active link
            var current = window.location.pathname.split("/").pop();
            if (!current || current === "") current = "index.html";
            links.forEach((link) => {
              if (current === link.file.split("/").pop()) {
                var el = nav.querySelector(link.sel);
                if (el) el.classList.add("active");
              }
            });
          }
        });
    </script>

    <script type="module">
      import { initI18n } from "./modules/i18n.js";
      initI18n();
    </script>
  </body>
