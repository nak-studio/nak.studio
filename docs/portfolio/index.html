<!DOCTYPE html>
<html lang="eu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bila</title>
    <link rel="stylesheet" href="vendor/nakds.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Cover / Hero Section -->
  <section class="nk-cover nk-cover--with-image nk-cover--dark-mode">
    <!-- Language Selector -->
    <div class="nk-toolbar nk-justify-content--end nk-pbn" style="position: absolute; top: 1rem; right: 1rem; z-index: 10;">
      <button id="lang-eu" class="nk-button lang-btn active" data-lang="eu" style="backdrop-filter: blur(10px); background: rgba(255,255,255,0.2);">EU</button>
      <button id="lang-en" class="nk-button lang-btn" data-lang="en" style="backdrop-filter: blur(10px); background: rgba(255,255,255,0.2);">EN</button>
    </div>
    
    <div class="nk-cover__title" data-i18n="siteTitle">Bila</div>
    <div class="nk-cover__subtitle" data-i18n="siteSubtitle">Artea bilaketa tresna bezela darabilt</div>
    
    <!-- Scroll indicator -->
    <div style="position: absolute; bottom: 2rem; animation: bounce 2s infinite;">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
    </div>
  </section>

  <!-- Filter Bar -->
  <div id="filter-bar" class="nk-section nk-bg--k-9" style="display: none;">
    <div class="nk-container--content nk-text-align--center">
      <div id="filter-display"></div>
    </div>
  </div>

  <!-- Main Content -->
  <main>
    
    <!-- Artworks Section -->
    <section class="nk-section">
      <div class="nk-container--content">
        <h2 class="nk-heading--2 nk-text-align--center nk-mbx" data-i18n="artworks">Irudiak</h2>
        <div id="artworks" class="nk-gap--large"></div>
        <link rel="stylesheet" href="custom-grid.css">
      </div>
    </section>

    <!-- Writings Section -->
    <section class="nk-section nk-bg--k-9">
      <div class="nk-container--content">
        <h2 class="nk-heading--2 nk-text-align--center nk-mbx" data-i18n="writings">Hitzak</h2>
        <div id="writings" class="nk-grid-3@md nk-gap--large"></div>
      </div>
    </section>

  </main>

  <!-- Drawer -->
  <div id="drawer-dimmer" class="nk-dimmer"></div>
  <div id="artwork-drawer" class="nk-drawer">
    <button id="close-drawer" class="nk-button" style="margin-bottom: var(--large);" data-i18n="close">✕ Itxi</button>
    <div id="drawer-content"></div>
  </div>

  <!-- Footer -->
  <footer class="nk-footer nk-bg--k-2 nk-color--k-10 nk-text-align--center">
    <div class="nk-container--content">
      <img src="assets/naiara-abaroa.jpg" alt="Naiara Abaroa" class="nk-avatar nk-avatar--large" style="margin: 0 auto var(--medium);">
      <p id="footer-author"></p>
      <p id="footer-design"></p>
      <p id="footer-ai" class="nk-mtm"></p>
      <p id="footer-license"></p>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
